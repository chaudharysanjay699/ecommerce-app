# Development overrides — applied automatically by docker-compose alongside
# docker-compose.yml. Do NOT commit secrets here.
#
# Usage:
#   docker-compose up          # dev (hot-reload, source mounted)
#   docker-compose -f docker-compose.yml up   # production image (no override)

version: "3.9"

services:
  api:
    # Hot-reload in development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # Mount source so code changes reflect without rebuilding
    volumes:
      - .:/app
    environment:
      DB_ECHO: "true"
